<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моя визитка</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4f46e5, #06b6d4);
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: #fff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,.2);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #ddd;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
        }

        h1 {
            margin-bottom: 10px;
        }

        .job {
            color: #666;
            margin-bottom: 20px;
        }

        p {
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .contacts a {
            display: inline-block;
            margin: 8px;
            padding: 10px 18px;
            text-decoration: none;
            color: white;
            background: #4f46e5;
            border-radius: 8px;
            transition: .3s;
        }

        .contacts a:hover {
            background: #3730a3;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="avatar">👨‍💻</div>

    <h1>Иван Иванов</h1>
    <div class="job">Веб-разработчик</div>

    <p>
        Создаю современные сайты, интернет-магазины и веб-приложения.
        Работаю с HTML, CSS, JavaScript и PHP.
    </p>

    <div class="contacts">
        <a href="mailto:example@mail.com">Email</a>
        <a href="https://t.me/username" target="_blank">Telegram</a>
        <a href="tel:+79991234567">Позвонить</a>
    </div>
</div>

</body>
</html>
